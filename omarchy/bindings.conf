# Omarchy clipboard override — companion to glzr-dots (Windows).
#
# Omarchy's default clipboard (default/hypr/bindings/clipboard.conf) hardcodes
# SUPER for copy/paste/cut and is NOT covered by Omarchy's Super<->Alt mod
# toggle. This moves the universal clipboard onto ALT so the chords match the
# Windows side of glzr-dots (Alt+C/V/X) — same muscle memory on both machines.
#
# Install on the Omarchy machine: append these lines to
#     ~/.config/hypr/bindings.conf
# Omarchy sources that file last, at highest priority, so it overrides the
# defaults and survives updates. Reload Hyprland afterwards (Super+Esc or
# `hyprctl reload`).
#
# The combos sent mirror the Windows hook in glazewm/clipboard.py:
# Ctrl+Insert (copy) and Shift+Insert (paste) are the legacy CUA combos that
# work in BOTH terminals and GUI apps, which is the whole trick.

unbind = SUPER, C
unbind = SUPER, V
unbind = SUPER, X
unbind = SUPER CTRL, V

bindd = ALT, C, Universal copy, sendshortcut, CTRL, Insert, activewindow
bindd = ALT, V, Universal paste, sendshortcut, SHIFT, Insert, activewindow
bindd = ALT, X, Universal cut, sendshortcut, CTRL, X, activewindow
bindd = ALT CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard
